<input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox">

<div class="sidebar" id="sidebar">
  <div class="sidebar-item">
    <p>{{ site.description }}</p>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-nav-item{% if page.title == 'Home' %} active{% endif %}" href="{{ '/' | absolute_url }}">Home</a>

    {% assign pages_list = site.pages | sort:"url" %}
    {% for node in pages_list %}
      {% if node.title != null and node.layout == "page" %}
        <a class="sidebar-nav-item{% if page.url == node.url %} active{% endif %}" href="{{ node.url | absolute_url }}">{{ node.title }}</a>
      {% endif %}
    {% endfor %}

    <a class="sidebar-nav-item" href="https://github.com/ratifydata/ratify" target="_blank" rel="noopener">GitHub</a>
    <a class="sidebar-nav-item" href="https://discord.gg/RVU3cdRs9z" target="_blank" rel="noopener">Discord</a>
  </nav>

  <div class="sidebar-item">
    <p>&copy; {{ site.time | date: '%Y' }} Ratify. MIT Licensed.</p>
  </div>
</div>
